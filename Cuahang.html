        /* Bố cục 2 cột */
        .main-layout { display: flex; gap: 20px; max-width: 1200px; margin: auto; align-items: flex-start; }
        .product-section { flex: 3; }
        
        /* Giỏ hàng cố định bên phải */
        .cart-sidebar { 
            flex: 1; position: sticky; top: 20px; background: white; padding: 20px; 
            border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); border-top: 5px solid #28a745; 
            max-height: 85vh; display: flex; flex-direction: column; 
        }

        .header { text-align: center; color: #0056b3; margin-bottom: 10px; }
        
        /* Chữ chạy quảng cáo */
        .quang-cao {
            background: #fff; padding: 10px; border-radius: 10px; 
            color: #d9534f; font-weight: bold; margin-bottom: 20px; 
            border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* Thẻ sản phẩm có hiệu ứng nổi */
        #khu-vuc-san-pham { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
       .product-card h3 { 
    font-size: 14px; 
    height: 40px; /* Vẫn giữ chiều cao cố định 2 dòng */
    line-height: 20px; /* Khoảng cách giữa các dòng */
    overflow: hidden; /* Ẩn phần chữ thừa */
    margin: 10px 0; 
    color: #333;
    
    /* --------------------------------- */
    /* TRỌNG TÂM: Thêm dòng này để căn giữa */
    text-align: center; /* Tên sản phẩm sẽ nằm ở giữa */
    /* --------------------------------- */
    
    /* Giữ nguyên cái này để hiện ... nếu tên dài quá 2 dòng */
    display: -webkit-box;
    -webkit-line-clamp: 2; 
    -webkit-box-orient: vertical;
}
        .product-card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.15); 
            border: 1px solid #28a745;
        }

        /* Hình ảnh sản phẩm */
        .img-container { 
    height: 120px; /* Chốt cứng 120px cho tất cả các món */
    display: flex; 
    align-items: center; 
    justify-content: center; 
    overflow: hidden; 
    background: #f8f9fa;
    border-radius: 8px;
}
.img-container img { 
    max-width: 100%; 
    max-height: 100%; 
    object-fit: contain; /* Hình to hay nhỏ đều sẽ nằm gọn trong khung 120px */
}
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .price { color: #e44d26; font-size: 18px; font-weight: bold; margin: 10px 0; }
        .btn-buy { background: #28a745; color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Modal Form */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .form-thanh-toan { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; }
        .form-thanh-toan input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }

        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dashed #eee; font-size: 14px; }
        .btn-qty { background: #eee; border: none; padding: 2px 8px; border-radius: 4px; cursor: pointer; }

        @media (max-width: 800px) { .main-layout { flex-direction: column; } .cart-sidebar { position: static; width: 100%; } }
    </style>
</head>

    let gioHang = [];

   function hienThi(ds) {
    document.getElementById('khu-vuc-san-pham').innerHTML = ds.map(sp => {
        // Nếu sp.hinhAnh có dữ liệu thì lấy, nếu không thì hiện ảnh tạm 'no-image.jpg'
        let anh = sp.hinhAnh ? sp.hinhAnh : 'https://via.placeholder.com/150?text=Trung+Kien+Store';
        
        return `
            <div class="product-card">
                <div class="img-container">
                    <img src="${anh}" alt="${sp.Column3}">
                </div>
                <h3>${sp.Column3}</h3>
                <div class="price">${sp.Column6.toLocaleString()}đ</div>
                <button class="btn-buy" onclick="themVaoGio('${sp.Column3}', ${sp.Column6})">Mua ngay 🛒</button>
            </div>`;
    }).join('');
}

    function themVaoGio(ten, gia) {
        let sp = gioHang.find(i => i.ten === ten);
        if (sp) sp.sl++; else gioHang.push({ten, gia, sl: 1});
        capNhatGio();
    }

    function thayDoiSoLuong(ten, bd) {
        let sp = gioHang.find(i => i.ten === ten);
        if (sp) { sp.sl += bd; if (sp.sl <= 0) gioHang = gioHang.filter(i => i.ten !== ten); }
        capNhatGio();
    }

    function capNhatGio() {
        let h = ''; let t = 0;
        gioHang.forEach(i => {
            h += `<div class="cart-item">
                <div style="flex:1;"><b>${i.ten}</b></div>
                <div class="cart-controls">
                    <button class="btn-qty" onclick="thayDoiSoLuong('${i.ten}', -1)">-</button>
                    <span>${i.sl}</span>
                    <button class="btn-qty" onclick="thayDoiSoLuong('${i.ten}', 1)">+</button>
                </div>
                <div style="width:70px; text-align:right;">${(i.gia * i.sl).toLocaleString()}đ</div>
            </div>`;
            t += i.gia * i.sl;
        });
        document.getElementById('chi-tiet-gio').innerHTML = h || "Giỏ hàng trống.";
        document.getElementById('tong-tien').innerText = t.toLocaleString() + "đ";
    }

    function moFormThanhToan() { if (gioHang.length > 0) document.getElementById('formOverlay').style.display = 'flex'; }
    function dongFormThanhToan() { document.getElementById('formOverlay').style.display = 'none'; }

    function xacNhanDatHang() {
        let ten = document.getElementById('hoTen').value;
        let sdt = document.getElementById('soDienThoai').value;
        let dc = document.getElementById('diaChi').value;
        if (!ten || !sdt || !dc) return alert("Kiên cần đủ thông tin khách hàng nhé!");

        let msg = `Chào Trung Kiên, tôi là ${ten} (${sdt}).\nĐịa chỉ: ${dc}\nTôi đặt:\n`;
        gioHang.forEach(i => msg += `- ${i.ten} (x${i.sl})\n`);
        msg += `\nTổng tiền: ${document.getElementById('tong-tien').innerText}`;

        window.open(`https://zalo.me/0972822417?text=${encodeURIComponent(msg)}`, '_blank');
        gioHang = []; capNhatGio(); dongFormThanhToan();
    }

    hienThi(sanPhamGoc);
</script>
